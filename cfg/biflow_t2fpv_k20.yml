# ------------------- General Options -------------------------
description                  : BiFlow with K=20 (T2FPV-ETH)
results_root_dir             : results
dataset                      : t2fpv

# ------------------- Dataset -------------------------
past_frames                  : 8
future_frames                : 12
fold_name                    : 'eth'   # T2FPV fold: eth/hotel/univ/zara1/zara2

checkpt_freq                 : 1

# -------------------- Flow matching config -----------------------------
denoising_method             : 'fm'
sampling_steps               : 10
t_schedule                   : 'logit_normal'
objective                    : 'pred_data'
sigma_data                   : 0.13

logit_norm_mean              : -0.5
logit_norm_std               : 1.5
fm_in_scaling                : True
fm_wrapper                   : 'direct'

# -------------------- Data config -----------------------------
data_norm                    : 'min_max'
rotate                       : True
rotate_time_frame            : 6

# -------------------- Dropout config -----------------------------
drop_method                  : 'emb'
drop_logi_m                  : 0.5
drop_logi_k                  : 20.0
tied_noise                   : True

# -------------------- Evaluation config -----------------------------
K_LIST                       : [1, 3, 5, 20]

# -------------------- Loss config -----------------------------
LOSS_NN_MODE                 : 'agent'
LOSS_REG_REDUCTION           : 'sum'

# -------------------- Logger config -----------------------------
notes                        : 'BiFlow with K=20 (T2FPV-ETH)'


# ---------------------------- Configurations for model ----------------------------
MODEL:
    NUM_PROPOSED_QUERY: 20
    MODEL_OUT_DIM: 24
    MODEL_IN_DIM: 16
    REGRESSION_MLPS: [128, 256, 24]
    RECONSTRUCTION_MLPS: [128, 256, 16]
    CLASSIFICATION_MLPS: [128, 128, 1]

    PAST_TRAJ_MODE: "social_context_regen"
    USE_MASK: True
    USE_IMPUTATION: True
    USE_HIST_COND: True

    USE_ANCHOR: True


    CONTEXT_ENCODER:
        NAME: ContextEncoderScore
        NUM_INPUT_CONTEXT: 6
        AGENTS: 32              # T2FPV-ETH has more agents per scene than TBD

        NUM_CHANNEL_IN_MLP_AGENT: 256
        NUM_LAYER_IN_MLP_AGENT: 3

        D_MODEL: 128
        NUM_ATTN_LAYERS: 4
        NUM_ATTN_HEAD: 8
        DROPOUT_OF_ATTN: 0.1

    MOTION_DECODER:
        NAME: MotionDecoderScore
        D_MODEL: 128
        NUM_DECODER_BLOCKS: 4
        NUM_ATTN_HEAD: 8
        DROPOUT_OF_ATTN: 0.1

    FUSER_NAME: "SharedFuser"

approx_t_std                 : 5e-2
denoising_head_preds         : 20
k_preds                      : 20
max_num_ckpts                : 5

# ------------------------------- Optimizer Parameters ---------------------------------
train_batch_size             : 32
val_batch_size               : 32
test_batch_size              : 64

OPTIMIZATION:
    NUM_EPOCHS: 150

    OPTIMIZER: AdamW
    LR: 0.0001
    WEIGHT_DECAY: 0.01

    SCHEDULER: cosineAnnealingLRwithWarmup
    LR_CLIP: 0.000001

    GRAD_NORM_CLIP: 1.0

    LOSS_WEIGHTS: {
      'cls': 1.0,
      'reg': 1.0,
      'vel': 0.2,
      'branch_past': 0.5
    }

# ------------------------------- Resume Training -------------------------------
RESUME:
    resume: False
    ckpt_name: checkpoint_last
    start_epoch: 150
    early_stop: -1
